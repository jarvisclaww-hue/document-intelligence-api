version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: document_intelligence
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d document_intelligence']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://app:${DB_PASSWORD:-changeme}@postgres:5432/document_intelligence
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: document-intelligence-dev
      S3_ENDPOINT: http://minio:9000
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_this}
      API_KEY_SALT: ${API_KEY_SALT:-your_api_key_salt_change_this}
    ports:
      - '3000:3000'
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
    command: npm run dev

  worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://app:${DB_PASSWORD:-changeme}@postgres:5432/document_intelligence
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: document-intelligence-dev
      S3_ENDPOINT: http://minio:9000
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_this}
      API_KEY_SALT: ${API_KEY_SALT:-your_api_key_salt_change_this}
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
    command: npm run dev:worker

  bull-board:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
    ports:
      - '3001:3001'
    command: >
      sh -c "
      npm install express @bull-board/express @bull-board/ui &&
      node -e \"
      const express = require('express');
      const { createBullBoard } = require('@bull-board/api');
      const { BullAdapter } = require('@bull-board/api/bullAdapter');
      const { ExpressAdapter } = require('@bull-board/express');
      const Queue = require('bull');

      const redisOptions = {
        url: process.env.REDIS_URL
      };

      const serverAdapter = new ExpressAdapter();
      serverAdapter.setBasePath('/admin/queues');

      const documentQueue = new Queue('document-processing', redisOptions);
      const aiQueue = new Queue('ai-analysis', redisOptions);
      const webhookQueue = new Queue('webhooks', redisOptions);

      createBullBoard({
        queues: [
          new BullAdapter(documentQueue),
          new BullAdapter(aiQueue),
          new BullAdapter(webhookQueue),
        ],
        serverAdapter,
      });

      const app = express();
      app.use('/admin/queues', serverAdapter.getRouter());
      app.listen(3001, () => console.log('Bull Board running on port 3001'));
      \"
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
