# Fly.io configuration for Document Intelligence API
# https://fly.io/docs/reference/configuration/

app = "document-intelligence-api"
primary_region = "iad"  # Washington DC

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

    [http_service.checks.headers]
      Content-Type = "application/json"

  [[http_service.checks]]
    interval = "1m"
    timeout = "5s"
    method = "GET"
    path = "/api/v1/status"

[metrics]
  port = 9090
  path = "/metrics"

[mounts]
  source = "document_intelligence_data"
  destination = "/data"

[services.concurrency]
  hard_limit = 25
  soft_limit = 20
  type = "connections"

# Scaling
[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Health checks
[checks]
  [checks.health]
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    
    [checks.health.headers]
      Content-Type = "application/json"

# Environment-specific settings
[env.staging]
  NODE_ENV = "staging"

[env.production]
  NODE_ENV = "production"

# Optional: Database service
